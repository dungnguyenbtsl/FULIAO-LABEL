<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>富裕鞋業有限公司 - 標籤自動列印系統</title>
<style>
    /* GIAO DIỆN ĐIỀU KHIỂN NỀN TRẮNG SANG TRỌNG */
    .control-panel {
        background: #ffffff; 
        padding: 30px;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        margin: 20px auto 40px auto;
        max-width: 1200px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-shadow: 0 10px 30px rgba(148, 163, 184, 0.12);
    }
    
    .panel-header {
        display: table;
        width: 100%;
        border-bottom: 2px solid #f1f5f9; 
        padding-bottom: 18px;
        margin-bottom: 25px;
    }
    .panel-logo-cell {
        display: table-cell;
        vertical-align: middle;
        width: 55px;
    }
    .panel-title-cell {
        display: table-cell;
        vertical-align: middle;
        text-align: left !important;
    }

    .panel-logo {
        height: 42px;
        width: auto;
        display: block;
    }
    .control-panel h2 { 
        margin: 0; 
        color: #0f172a; 
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        padding-left: 8px;
    }
    
    .instruction-text {
        margin-bottom: 25px; 
        font-size: 14px; 
        color: #475569;
        background: #f8fafc; 
        padding: 12px 16px;
        border-left: 4px solid #0f172a; 
        border-radius: 0 8px 8px 0;
        line-height: 1.5;
        text-align: left !important;
    }

    .action-zone {
        display: block;
        text-align: left !important;
        margin-bottom: 30px;
    }
    .action-item {
        display: inline-block;
        vertical-align: middle;
        margin-right: 16px;
        margin-bottom: 10px;
    }

    .file-upload-input {
        padding: 10px 16px; 
        border: 2px dashed #cbd5e1;
        background: #ffffff;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        color: #475569;
        transition: all 0.25s ease;
    }
    .file-upload-input:hover {
        border-color: #0f172a;
        background: #f8fafc;
    }

    .btn-base {
        padding: 11px 22px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        transition: all 0.2s ease;
    }
    .btn-base:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .btn-copy {
        background: #0f172a;
        color: #ffffff;
    }
    .btn-copy:hover { background: #1e293b; }
    
    .btn-print {
        background: #10b981;
        color: white;
    }
    .btn-print:hover { background: #059669; }

    /* BẢNG NỘI DUNG MẪU ĐÃ ĐƯỢC CĂN GIỮA TOÀN BỘ */
    .sample-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 20px;
        font-size: 13.5px;
        background: #ffffff; 
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }
    .sample-table th { 
        background-color: #f8fafc; 
        color: #1e293b; 
        font-weight: 600;
        padding: 14px 16px;
        border-bottom: 2px solid #e2e8f0;
        text-align: center !important;
    }
    .sample-table td {
        padding: 14px 16px;
        color: #475569;
        border-bottom: 1px solid #f1f5f9;
        text-align: center !important; 
        line-height: 1.5;
    }
    .sample-table tbody tr:hover td {
        background-color: #fcfdfe; 
    }
